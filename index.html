<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Caracalo-Cat War: AoH Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #ui-top { display: none; gap: 10px; background: #34495e; padding: 15px; border-radius: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        canvas { display: none; border: 5px solid #22313f; background: #2c3e50; cursor: crosshair; }
        
        #main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .campaign-card { background: #2980b9; padding: 30px; border-radius: 15px; cursor: pointer; transition: 0.3s; text-align: center; border: 3px solid #3498db; }
        .campaign-card:hover { transform: scale(1.05); background: #3498db; }
        
        .money-val { color: #2ecc71; font-weight: bold; }
        .btn { padding: 8px 12px; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        .btn-factory { background: #e67e22; }
        .btn-recruit { background: #3498db; }
        .btn-admin { background: #95a5a6; }
        .btn-build { background: #9b59b6; margin-top: 5px; width: 100%; }
        
        #tileMenu, #adminSection, #recruitSelect { position: absolute; background: #ecf0f1; color: #2c3e50; padding: 15px; border-radius: 8px; display: none; flex-direction: column; z-index: 100; border: 2px solid #34495e; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #adminSection { width: 320px; max-height: 80vh; overflow-y: auto; top: 20px; }
        input { margin-bottom: 8px; padding: 6px; width: 90%; border: 1px solid #ccc; border-radius: 4px; }
        #controls-hint { margin-top: 10px; color: #bdc3c7; font-size: 0.85rem; display: none; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color: #f1c40f; font-size: 3rem; margin-bottom: 40px;">CAMPAIGN</h1>
        <div class="campaign-card" onclick="startCampaign()">
            <h2>The Caracalo-Cat War</h2>
            <p>Advanced Battle System & Custom Visuals</p>
        </div>
    </div>

    <div id="ui-top">
        <div class="stats">Money: <span class="money-val">$<span id="money">50</span></span></div>
        <button class="btn btn-factory" onclick="clickFactory()">Factory (+$<span id="incomeVal">1</span>)</button>
        <button id="recruitBtn" class="btn btn-recruit" onclick="openRecruitMenu()">Recruit</button>
        <button class="btn btn-admin" onclick="openAdmin()">Admin Panel</button>
    </div>

    <div style="position: relative;">
        <canvas id="gameBoard" width="700" height="500"></canvas>
        <div id="recruitSelect">
            <div style="font-weight:bold; margin-bottom:10px">Recruit Units:</div>
            <div id="unitListOptions"></div>
            <button class="btn btn-build" style="background:#e74c3c" onclick="closeRecruit()">Cancel</button>
        </div>
        <div id="tileMenu"><div id="menuTitle" style="font-weight:bold; margin-bottom:5px">Tile Options</div><button class="btn btn-build" onclick="build('factory')">Build Factory ($30)</button><button class="btn btn-build" onclick="build('fort')">Fortify ($25)</button><button class="btn btn-build" style="background:#e74c3c" onclick="closeMenu()">Close</button></div>
        
        <div id="adminSection">
            <h3 style="margin-top:0">Admin: Unit Creator</h3>
            <div id="existingUnits" style="font-size: 0.8rem; margin-bottom: 10px;"></div>
            <hr>
            <input type="text" id="newUnitName" placeholder="Unit Name">
            <input type="text" id="newUnitIcon" placeholder="Emoji OR Image URL">
            <input type="number" id="newUnitCost" placeholder="Cost ($)">
            <input type="number" id="newUnitHP" placeholder="HP (e.g. 100)">
            <input type="number" id="newUnitAtk" placeholder="Attack (e.g. 20)">
            <select id="newUnitTeam" style="width: 95%; margin-bottom: 10px;">
                <option value="france">Blue Team</option>
                <option value="germany">Orange Team</option>
            </select>
            <button class="btn btn-recruit" onclick="addNewUnit()">Create & Register</button>
            <button class="btn btn-build" style="background:#e74c3c" onclick="closeAdmin()">Close</button>
        </div>
    </div>

    <div id="controls-hint"><strong>L-Click:</strong> Select/Build | <strong>R-Click:</strong> Attack/Move</div>

<script>
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const moneyEl = document.getElementById('money');
    
    const TILE_SIZE = 50;
    const COLS = 14;
    const ROWS = 10;
    
    let money = 100, aiMoney = 50;
    let marchSpeed = 0.015;
    let tiles = [], marches = [], imageCache = {};

    let unitRegistry = [
        { name: "Blue Soldier", icon: "🐱", cost: 10, hp: 100, atk: 25, team: "france" },
        { name: "Orange Raider", icon: "🐆", cost: 10, hp: 100, atk: 25, team: "germany" }
    ];

    function startCampaign() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('ui-top').style.display = 'flex';
        document.getElementById('gameBoard').style.display = 'block';
        document.getElementById('controls-hint').style.display = 'block';
        initMap();
        setInterval(runAI, 3000);
        setInterval(processCombat, 500); // Combat ticks every 0.5s
        draw();
    }

    function initMap() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                let owner = 'neutral';
                if (c < 3 && r > 2 && r < 7) owner = 'france';
                if (c > 10 && r > 2 && r < 7) owner = 'germany';
                
                let startUnits = (owner !== 'neutral' ? 1 : 0);
                tiles.push({ 
                    x: c, y: r, owner, 
                    units: startUnits, 
                    unitType: owner === 'france' ? unitRegistry[0] : (owner === 'germany' ? unitRegistry[1] : null),
                    currentHP: startUnits * 100,
                    type: 'empty', level: 0 
                });
            }
        }
    }

    canvas.oncontextmenu = (e) => e.preventDefault();

    function addNewUnit() {
        const name = document.getElementById('newUnitName').value;
        const icon = document.getElementById('newUnitIcon').value;
        const cost = parseInt(document.getElementById('newUnitCost').value) || 10;
        const hp = parseInt(document.getElementById('newUnitHP').value) || 100;
        const atk = parseInt(document.getElementById('newUnitAtk').value) || 20;
        const team = document.getElementById('newUnitTeam').value;

        if (icon.startsWith('http')) {
            const img = new Image();
            img.src = icon;
            imageCache[icon] = img;
        }

        unitRegistry.push({ name, icon, cost, hp, atk, team });
        renderAdminUnits();
    }

    function processCombat() {
        marches.forEach(m => {
            if (m.progress >= 1 && m.targetTile.owner !== 'neutral' && m.targetTile.owner !== m.team) {
                // AoH3 Battle Tick
                let attackerPower = m.units * m.unitType.atk;
                let defenderPower = m.targetTile.units * m.targetTile.unitType.atk;
                
                // Fort bonus
                if (m.targetTile.type === 'fort') defenderPower *= (1 + m.targetTile.level * 0.2);

                m.targetTile.currentHP -= attackerPower;
                m.totalHP -= defenderPower;

                // Update counts based on HP
                m.units = Math.ceil(m.totalHP / m.unitType.hp);
                m.targetTile.units = Math.ceil(m.targetTile.currentHP / m.targetTile.unitType.hp);
            }
        });
    }

    function update() {
        for (let i = marches.length - 1; i >= 0; i--) {
            let m = marches[i];
            
            // Movement phase
            if (m.progress < 1) {
                m.progress += marchSpeed;
            } else {
                // Battle or Arrival phase
                if (m.targetTile.owner === m.team || m.targetTile.owner === 'neutral') {
                    // Friendly Reinforcement or Neutral Capture
                    m.targetTile.owner = m.team;
                    m.targetTile.unitType = m.unitType;
                    m.targetTile.units += m.units;
                    m.targetTile.currentHP += m.totalHP;
                    marches.splice(i, 1);
                } else {
                    // It's an active battle. If attacker or defender dies, end march.
                    if (m.units <= 0) { marches.splice(i, 1); }
                    else if (m.targetTile.units <= 0) {
                        m.targetTile.owner = m.team;
                        m.targetTile.unitType = m.unitType;
                        m.targetTile.units = m.units;
                        m.targetTile.currentHP = m.totalHP;
                        m.targetTile.type = 'empty';
                        marches.splice(i, 1);
                    }
                }
            }
        }
    }

    function startMarch(from, to, team) {
        if (Math.abs(from.x - to.x) + Math.abs(from.y - to.y) === 1 && from.units > 0) {
            marches.push({ 
                fromX: from.x, fromY: from.y, toX: to.x, toY: to.y, 
                progress: 0, units: from.units, totalHP: from.currentHP,
                unitType: from.unitType, targetTile: to, team: team 
            });
            from.units = 0; from.currentHP = 0;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        tiles.forEach(tile => {
            ctx.fillStyle = tile.owner === 'france' ? "#2980b9" : (tile.owner === 'germany' ? "#d35400" : "#1a1a1a");
            ctx.fillRect(tile.x * 50, tile.y * 50, 50, 50);
            ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.strokeRect(tile.x * 50, tile.y * 50, 50, 50);
            
            if (tile.units > 0 && tile.unitType) {
                drawUnit(tile.unitType.icon, tile.x * 50 + 5, tile.y * 50 + 25);
                ctx.fillStyle = "white"; ctx.font = "bold 12px Arial";
                ctx.fillText(tile.units, tile.x * 50 + 5, tile.y * 50 + 45);
            }
            if (tile.type !== 'empty') {
                ctx.fillText(tile.type === 'factory' ? "🏭" : "🏰", tile.x * 50 + 32, tile.y * 50 + 15);
            }
        });

        marches.forEach(m => {
            let x = (m.fromX * 50 + 25) + (m.toX - m.fromX) * 50 * m.progress;
            let y = (m.fromY * 50 + 25) + (m.toY - m.fromY) * 50 * m.progress;
            
            // Red arrow for battle, Blue/Orange for movement
            ctx.beginPath();
            ctx.strokeStyle = (m.progress >= 1) ? "#ff0000" : (m.team === 'france' ? "#3498db" : "#e74c3c");
            ctx.lineWidth = 4;
            ctx.moveTo(m.fromX * 50 + 25, m.fromY * 50 + 25);
            ctx.lineTo(x, y);
            ctx.stroke();

            if (m.progress < 1) drawUnit(m.unitType.icon, x - 10, y - 10);
        });

        if (selectedTile) { ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.strokeRect(selectedTile.x * 50, selectedTile.y * 50, 50, 50); }
        update(); requestAnimationFrame(draw);
    }

    function drawUnit(icon, x, y) {
        if (icon.startsWith('http')) {
            if (imageCache[icon]) ctx.drawImage(imageCache[icon], x, y, 20, 20);
        } else {
            ctx.font = "16px Arial";
            ctx.fillText(icon, x, y);
        }
    }

    // AI Logic
    function runAI() {
        aiMoney += 10;
        let aiTiles = tiles.filter(t => t.owner === 'germany');
        if (aiMoney >= 20 && aiTiles.length > 0) {
            let t = aiTiles[Math.floor(Math.random() * aiTiles.length)];
            t.units += 1; t.currentHP += 100; t.unitType = unitRegistry[1]; aiMoney -= 10;
        }
        aiTiles.forEach(t => {
            if (t.units > 2) {
                let n = tiles.filter(target => Math.abs(target.x - t.x) + Math.abs(target.y - t.y) === 1);
                startMarch(t, n[Math.floor(Math.random()*n.length)], 'germany');
            }
        });
    }

    // UI & Selectors
    function openRecruitMenu() {
        document.getElementById('recruitSelect').style.display = 'flex';
        document.getElementById('unitListOptions').innerHTML = unitRegistry.filter(u => u.team === "france").map(u => 
            `<button class="btn btn-build" onclick="buyUnit('${u.name}')">${u.icon.startsWith('http') ? '🖼️' : u.icon} ${u.name} ($${u.cost})</button>`
        ).join('');
    }
    function buyUnit(name) {
        let u = unitRegistry.find(r => r.name === name);
        if (money >= u.cost && selectedTile && selectedTile.owner === 'france') {
            money -= u.cost; selectedTile.units += 1; selectedTile.currentHP += u.hp; selectedTile.unitType = u;
        }
        closeRecruit(); updateUI();
    }
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const col = Math.floor((e.clientX - rect.left) / TILE_SIZE);
        const row = Math.floor((e.clientY - rect.top) / TILE_SIZE);
        const clickedTile = tiles.find(t => t.x === col && t.y === row);
        if (e.button === 0) { selectedTile = clickedTile; if(clickedTile.owner === 'france') showMenu(e.clientX - rect.left, e.clientY - rect.top, clickedTile); }
        else if (e.button === 2 && selectedTile) startMarch(selectedTile, clickedTile, 'france');
        updateUI();
    });
    function clickFactory() { let inc = 1; tiles.forEach(t => { if(t.owner === 'france' && t.type === 'factory') inc++; }); money += inc; updateUI(); }
    function showMenu(x, y, t) { menuTarget = t; let m = document.getElementById('tileMenu'); m.style.display = 'flex'; m.style.left = x + "px"; m.style.top = y + "px"; }
    function closeMenu() { document.getElementById('tileMenu').style.display = 'none'; }
    function closeAdmin() { document.getElementById('adminSection').style.display = 'none'; }
    function closeRecruit() { document.getElementById('recruitSelect').style.display = 'none'; }
    function openAdmin() { if(prompt("Pass:") === "Lahazavr88@99") { document.getElementById('adminSection').style.display = 'flex'; renderAdminUnits(); } }
    function renderAdminUnits() { document.getElementById('existingUnits').innerHTML = unitRegistry.map(u => `• ${u.name} (HP:${u.hp} ATK:${u.atk})`).join('<br>'); }
    function build(t) { if(t==='factory' && money>=30){money-=30; menuTarget.type='factory';} else if(t==='fort' && money>=25){money-=25; menuTarget.type='fort'; menuTarget.level++;} closeMenu(); updateUI(); }
    function updateUI() { moneyEl.innerText = Math.floor(money); let inc = 1; tiles.forEach(t => { if(t.owner === 'france' && t.type === 'factory') inc++; }); document.getElementById('incomeVal').innerText = inc; }
</script>
</body>
</html>
